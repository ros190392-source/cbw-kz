name: CI

# Quality gate for CBW KZ — protects the editorial/scoring logic from silent
# breakage. Runs on every push and pull request.
on:
  push:
  pull_request:

jobs:
  quality:
    name: Typecheck & scoring tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run scoring tests
        run: npm run test

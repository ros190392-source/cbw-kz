<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="CBW KZ avatar">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1A212E"/>
      <stop offset="60%" stop-color="#11161F"/>
      <stop offset="100%" stop-color="#0A0D13"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2C75C"/>
      <stop offset="50%" stop-color="#E7B53C"/>
      <stop offset="100%" stop-color="#C9952C"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- subtle premium ring (stays inside Telegram's circular crop) -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.30"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#2A3344" stroke-width="1.5" opacity="0.6"/>

  <!-- monogram -->
  <text x="256" y="250" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="150" font-weight="800" letter-spacing="2" fill="url(#gold)">CBW</text>

  <!-- divider -->
  <rect x="196" y="288" width="120" height="3" rx="1.5" fill="url(#gold)" opacity="0.85"/>

  <!-- locale -->
  <text x="256" y="340" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="46" font-weight="700" letter-spacing="14" fill="#F4F6FA">KZ</text>
</svg>

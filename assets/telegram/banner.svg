<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="CBW KZ banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0D13"/>
      <stop offset="55%" stop-color="#11161F"/>
      <stop offset="100%" stop-color="#1A212E"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#E7B53C" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E7B53C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F2C75C"/>
      <stop offset="100%" stop-color="#C9952C"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint dot grid (subtle, no trading/casino motifs) -->
  <g fill="#2A3344" opacity="0.35">
    <circle cx="980" cy="120" r="2"/><circle cx="1040" cy="120" r="2"/><circle cx="1100" cy="120" r="2"/><circle cx="1160" cy="120" r="2"/>
    <circle cx="980" cy="180" r="2"/><circle cx="1040" cy="180" r="2"/><circle cx="1100" cy="180" r="2"/><circle cx="1160" cy="180" r="2"/>
    <circle cx="980" cy="240" r="2"/><circle cx="1040" cy="240" r="2"/><circle cx="1100" cy="240" r="2"/><circle cx="1160" cy="240" r="2"/>
  </g>

  <!-- logo mark -->
  <rect x="96" y="232" width="92" height="92" rx="20" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <text x="142" y="297" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="42" font-weight="800" fill="url(#gold)">CBW</text>

  <!-- wordmark -->
  <text x="214" y="286" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="78" font-weight="800"
        letter-spacing="1" fill="#F4F6FA">CBW <tspan fill="url(#gold)">KZ</tspan></text>

  <!-- tagline -->
  <text x="216" y="338" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="30" font-weight="500"
        letter-spacing="3" fill="#8B95A7">KAZAKHSTAN CRYPTO MEDIA</text>

  <!-- accent rule + promise -->
  <rect x="216" y="372" width="150" height="4" rx="2" fill="url(#gold)"/>
  <text x="380" y="384" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="600"
        letter-spacing="2" fill="#C9952C">SIGNAL OVER NOISE</text>
</svg>

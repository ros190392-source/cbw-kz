<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Scam warning template">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A0D13"/><stop offset="55%" stop-color="#13110F"/><stop offset="100%" stop-color="#241712"/></linearGradient>
    <radialGradient id="glow" cx="85%" cy="18%" r="60%"><stop offset="0%" stop-color="#F0623A" stop-opacity="0.20"/><stop offset="100%" stop-color="#F0623A" stop-opacity="0"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F2C75C"/><stop offset="100%" stop-color="#C9952C"/></linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <rect x="0" y="0" width="14" height="720" fill="#F0623A"/>

  <rect x="64" y="56" width="56" height="56" rx="14" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <text x="92" y="95" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="url(#gold)">CBW</text>
  <text x="136" y="84" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#F4F6FA">CBW <tspan fill="url(#gold)">KZ</tspan></text>
  <text x="137" y="108" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="500" letter-spacing="3" fill="#8B95A7">KAZAKHSTAN CRYPTO MEDIA</text>

  <rect x="996" y="60" width="220" height="48" rx="24" fill="none" stroke="#F0623A" stroke-width="2"/>
  <text x="1106" y="91" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#F0623A">SCAM ALERT</text>

  <!-- minimal warning glyph -->
  <path d="M 112 360 L 184 360 L 148 296 Z" fill="none" stroke="#F0623A" stroke-width="6" stroke-linejoin="round"/>
  <rect x="145" y="320" width="6" height="22" rx="3" fill="#F0623A"/><rect x="145" y="348" width="6" height="6" rx="3" fill="#F0623A"/>

  <text x="72" y="470" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="96" font-weight="800" letter-spacing="2" fill="#F4F6FA">SCAM <tspan fill="#F0623A">WARNING</tspan></text>
  <rect x="76" y="500" width="190" height="6" rx="3" fill="#F0623A"/>
  <text x="76" y="556" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="34" font-weight="500" fill="#D8B0A2">Verify before you trust</text>

  <text x="72" y="676" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="#C9952C">cbw.kz <tspan fill="#8B95A7" font-weight="500">· signal over noise</tspan></text>
  <text x="1208" y="676" text-anchor="end" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="#8B95A7">@cbw_kz</text>
</svg>
